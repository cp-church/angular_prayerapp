name: Send user hourly prayer reminders

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  send-user-hourly-reminders:
    runs-on: ubuntu-latest
    steps:
      # Use the same service_role JWT as in Supabase → Project Settings → API ("service_role" secret).
      # Anon/public key will get 401: the function compares Authorization to SUPABASE_SERVICE_ROLE_KEY.
      - name: Invoke send-user-hourly-prayer-reminders Edge Function
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            '${{ secrets.SUPABASE_URL }}/functions/v1/send-user-hourly-prayer-reminders' \
            -H 'Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}' \
            -H 'apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}' \
            -H 'Content-Type: application/json')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Error: send-user-hourly-prayer-reminders failed with status $HTTP_CODE"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::User hourly prayer reminders failed. Check Supabase function logs."
